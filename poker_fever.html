<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百式ゲーム王国</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Boogaloo&display=swap" rel="stylesheet">
<style>
:root{
  --red:#ff3333;--yel:#ffdd00;--grn:#11dd55;
  --blu:#00aaff;--pnk:#ff44cc;--ora:#ff8800;--pur:#aa66ff;
}
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(160deg,#6614aa 0%,#4408aa 40%,#1a44cc 100%);
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  font-family:'Boogaloo',cursive;overflow-y:auto;overflow-x:hidden;padding:12px 0 24px;
}
.cab{
  width:min(480px,99vw);
  background:linear-gradient(160deg,#9944ee 0%,#7722cc 50%,#3355dd 100%);
  border-radius:24px 24px 14px 14px;
  border:3px solid var(--pur);
  box-shadow:0 0 0 1px #cc99ff,0 0 40px rgba(170,102,255,.55),0 0 80px rgba(170,102,255,.2),inset 0 1px 0 rgba(255,255,255,.12);
  display:flex;flex-direction:column;
}
