<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百式ゲーム王国</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Barlow+Condensed:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#D32F2F;--red2:#E53935;--red3:#FF5252;--gold:#F5A623;--gold2:#FFB300;--dark:#1A1A1A;--dark2:#222222;--dark3:#2D2D2D;--gray:#888;--light:#F5F5F5;--white:#FFFFFF;--green:#2E7D32;--green2:#43A047;--blue:#1565C0;--blue2:#1976D2;--win:#F5A623;--lose:#D32F2F;--font-jp:'Noto Sans JP',sans-serif;--font-en:'Barlow Condensed','Oswald',sans-serif;}
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
body{background:#111;min-height:100vh;display:flex;font-family:var(--font-jp);overflow-x:hidden;color:var(--white);}
#sidebar{width:190px;min-width:190px;background:var(--dark2);border-right:3px solid var(--red);min-height:100vh;display:flex;flex-direction:column;padding:14px 10px;gap:10px;position:sticky;top:0;flex-shrink:0;}
#sidebar.hidden{display:none}
.sb-logo{text-align:center;padding-bottom:10px;border-bottom:2px solid var(--red)}
.sb-logo-icon{font-size:32px;line-height:1}
.sb-logo-title{font-family:var(--font-jp);font-weight:900;font-size:13px;color:var(--gold);margin-top:4px;letter-spacing:.05em}
.sb-av{width:64px;height:64px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid var(--gold);margin:0 auto 4px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.sb-name{font-family:var(--font-jp);font-weight:700;font-size:14px;color:var(--white);text-align:center;margin-bottom:2px}
.sb-medals-box{background:var(--dark3);border:2px solid var(--gold);border-radius:8px;padding:8px 6px;text-align:center;}
.sb-medals-lbl{font-family:var(--font-en);font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.12em}
.sb-medals-val{font-family:var(--font-en);font-size:32px;font-weight:900;color:var(--gold);line-height:1.1}
.sb-medals-unit{font-family:var(--font-jp);font-size:11px;color:rgba(245,166,35,.7)}
.sb-daily{background:var(--dark3);border:2px solid var(--green2);border-radius:6px;padding:6px 8px;text-align:center;font-family:var(--font-jp);font-size:11px;color:var(--green2);font-weight:700}
.sb-nav{display:flex;flex-direction:column;gap:5px;flex:1}
.sb-nav-btn{background:var(--dark3);border:2px solid #444;border-radius:6px;padding:9px 8px;cursor:pointer;transition:all .15s;font-family:var(--font-jp);font-size:13px;font-weight:700;color:var(--light);text-align:center;}
.sb-nav-btn:hover{background:var(--red);border-color:var(--red);color:var(--white)}
.sb-logout{background:transparent;border:2px solid #555;color:#888;border-radius:6px;font-family:var(--font-jp);font-size:12px;padding:8px;cursor:pointer;transition:all .1s;width:100%}
.sb-logout:hover{border-color:var(--red3);color:var(--red3)}
#av-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center;}
#av-modal.show{display:flex}
.av-modal-box{background:var(--dark2);border:3px solid var(--red);border-radius:12px;padding:20px;width:300px}
.av-modal-title{font-family:var(--font-jp);font-weight:900;font-size:16px;text-align:center;margin-bottom:14px;color:var(--gold)}
.av-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.av-opt{width:44px;height:44px;border-radius:50%;background:var(--dark3);border:2px solid #555;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .15s}
.av-opt:hover,.av-opt.sel{border-color:var(--gold);background:rgba(245,166,35,.15)}
.av-close{width:100%;background:var(--dark3);border:2px solid #555;color:#aaa;font-family:var(--font-jp);font-size:13px;padding:8px;border-radius:6px;cursor:pointer}
.cab{flex:1;background:var(--dark);border-left:2px solid #333;display:flex;flex-direction:column;min-height:100vh;}
@media(max-width:600px){
body{display:block !important}
#sidebar{display:none !important}
.cab{width:100vw !important;max-width:100vw !important;border-left:none !important;display:flex !important;flex-direction:column !important;min-height:100vh !important}
.screen{min-height:calc(100vh - 90px) !important}
.ca{gap:3px !important;padding:6px 4px 3px !important}
.card{width:54px !important;height:76px !important;border-radius:6px !important;border-width:2px !important}
.ct,.cb{font-size:11px !important;top:3px !important;left:4px !important;bottom:3px !important;right:4px !important}
.cs{font-size:20px !important}
.cw{gap:3px !important}
.hl-lbl{font-size:9px !important}
.pt{padding:2px 3px !important;overflow-x:auto !important}
.pt-hb{width:22px !important;font-size:7px !important}
.pt-o{width:22px !important;font-size:8px !important}
.pt-n{font-size:9px !important;letter-spacing:0 !important}
.pk-hud{padding:4px 8px !important}
.pk-val{font-size:22px !important}
.pk-lbl{font-size:8px !important}
.pk-hud-col.b .pk-val{font-size:32px !important}
.pk-hud-col.b .pk-lbl{font-size:9px !important}
.pk-hud-col.b{padding:3px 12px !important}
.pk-btns{padding:4px 6px 6px !important;gap:4px !important}
.db{font-size:15px !important;padding:11px !important}
.bb{font-size:14px !important;padding:10px !important}
.bm{font-size:10px !important;padding:10px 8px !important}
.rd{min-height:36px !important;padding:3px 6px !important}
.rn{font-size:16px !important}
.rz,.rw{font-size:12px !important}
.du-cards-area{padding:4px 6px !important}
.du-dealer-side{margin-right:8px !important}
.duc{width:60px !important;height:86px !important}
.duc-ct,.duc-cb{font-size:14px !important}
.duc-cs{font-size:28px !important}
.du-player-cards{gap:5px !important}
.du-win-val{font-size:26px !important}
.du-msg-txt{font-size:13px !important}
.du-btn-area{padding:6px 8px 10px !important}
.du-btn-row{gap:5px !important}
.du-btn-double,.du-btn-half,.du-btn-collect{font-size:12px !important;padding:10px 5px !important}
.du-btn-lbl{font-size:8px !important}
.du-hud-val{font-size:20px !important}
.gc-icon{font-size:36px !important}
.gc-name{font-size:13px !important}
.lobby-hdr{padding:10px 12px !important}
.login-box{max-width:100% !important;padding:14px !important}
#slogin{padding:14px 12px !important;gap:10px !important}
.pin-dot{width:46px !important;height:46px !important;font-size:18px !important}
.numpad{gap:5px !important;max-width:220px !important}
.nb{padding:11px !important;font-size:18px !important}
.login-input{font-size:16px !important;padding:9px 12px !important}
.cab-t{font-size:18px !important}
.cbtn{font-size:13px !important;padding:11px 20px !important}
}
.mq-wrap{background:var(--red);padding:5px 0;overflow:hidden;flex-shrink:0}
.mq{display:flex;width:max-content;animation:mqA 18s linear infinite}
@keyframes mqA{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mq span{font-family:var(--font-en);font-size:12px;font-weight:700;color:var(--white);padding:0 24px;letter-spacing:.08em}
.tp{background:var(--dark2);padding:10px 16px 8px;text-align:center;border-bottom:3px solid var(--red);flex-shrink:0}
.led-row{display:flex;justify-content:center;gap:5px;margin-bottom:6px}
.led{width:8px;height:8px;border-radius:50%;animation:lp 1.2s ease-in-out infinite}
.l0{background:var(--red2)}.l1{background:var(--gold);animation-delay:.15s}.l2{background:#fff;animation-delay:.3s}
.l3{background:var(--green2);animation-delay:.45s}.l4{background:var(--blue2);animation-delay:.6s}.l5{background:var(--red3);animation-delay:.75s}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.5)}}
.cab-t{font-family:var(--font-jp);font-weight:900;font-size:clamp(20px,4.5vw,28px);color:var(--white);line-height:1.2}
.cab-t span{color:var(--gold)}
.cab-s{font-family:var(--font-en);font-size:11px;color:#888;letter-spacing:.2em;margin-top:2px}
.screen{background:var(--dark);flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;min-height:500px}
.fl{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,.04);animation:scA 7s linear infinite;pointer-events:none;z-index:201}
@keyframes scA{0%{top:-2px;opacity:0}5%{opacity:.6}95%{opacity:.6}100%{top:110%;opacity:0}}
.gs{display:none;flex-direction:column;flex:1;position:relative;z-index:1}
.gs.active{display:flex}
#slogin{align-items:center;justify-content:center;gap:14px;padding:20px 16px;background:var(--dark)}
.login-logo{font-family:var(--font-jp);font-weight:900;font-size:clamp(18px,5vw,24px);text-align:center;line-height:1.5;color:var(--white)}
.login-logo span{color:var(--gold)}
.login-box{background:var(--dark2);border:3px solid var(--red);border-radius:10px;padding:18px;width:100%;max-width:320px;}
.login-tabs{display:flex;margin-bottom:14px;border-radius:6px;overflow:hidden;border:2px solid var(--red)}
.login-tab{flex:1;padding:11px;text-align:center;font-family:var(--font-jp);font-weight:700;font-size:14px;cursor:pointer;background:var(--dark3);color:#888;transition:all .15s}
.login-tab.active{background:var(--red);color:var(--white)}
.login-box-title{font-family:var(--font-jp);font-size:12px;color:#888;margin-bottom:10px;text-align:center}
.login-input{background:var(--dark3);border:2px solid #555;border-radius:6px;color:var(--white);font-family:var(--font-jp);font-size:20px;font-weight:700;padding:11px 14px;width:100%;outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--gold)}
.login-input::placeholder{color:#555;font-size:14px;font-weight:400}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.pin-dot{width:54px;height:54px;border-radius:50%;background:var(--dark3);border:2px solid #555;font-size:24px;color:#555;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pin-dot.filled{background:var(--red);border-color:var(--red3);color:var(--white)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%;max-width:240px;margin:0 auto}
.nb{background:var(--dark3);border:2px solid #444;border-radius:6px;color:var(--white);font-family:var(--font-en);font-size:22px;font-weight:700;padding:14px;cursor:pointer;transition:all .12s}
.nb:hover{background:#444;border-color:#666}
.nb:active{transform:scale(.93)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.nb-del{font-size:13px;font-family:var(--font-jp)}
.nb-ok{background:var(--green);border-color:var(--green2);font-size:13px;font-family:var(--font-jp)}
.login-msg{font-size:14px;text-align:center;min-height:20px;margin-top:8px;font-family:var(--font-jp);font-weight:700}
.login-msg.ok{color:var(--green2)}
.login-msg.err{color:var(--red3);animation:shake .35s ease}
.login-msg.ing{color:var(--gold)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#slobby{align-items:center;justify-content:flex-start;overflow-y:auto;background:var(--dark)}
.lobby-hdr{background:var(--dark2);padding:12px 16px;width:100%;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--red);flex-shrink:0}
.lobby-av{width:50px;height:50px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--gold);flex-shrink:0}
.lobby-name{font-family:var(--font-jp);font-weight:900;font-size:17px;color:var(--white)}
.lobby-medals{display:flex;align-items:center;gap:4px}
.lobby-medals-val{font-family:var(--font-en);font-size:22px;font-weight:900;color:var(--gold)}
.lobby-medals-lbl{font-family:var(--font-jp);font-size:12px;color:rgba(245,166,35,.7)}
.lobby-logout{background:transparent;border:2px solid #555;color:#888;border-radius:20px;font-family:var(--font-jp);font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;margin-left:auto;transition:all .1s}
.lobby-logout:hover{border-color:var(--red3);color:var(--red3)}
.lobby-body{display:flex;flex-direction:column;gap:10px;padding:14px;width:100%}
.lobby-sec{font-family:var(--font-en);font-size:11px;font-weight:700;color:#666;letter-spacing:.2em;margin-bottom:2px}
.game-card{background:var(--dark2);border:2px solid #333;border-radius:8px;padding:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px}
.game-card:hover{border-color:var(--red);transform:translateX(4px)}
.gc-icon{font-size:48px;flex-shrink:0}
.gc-name{font-family:var(--font-jp);font-weight:900;font-size:16px;color:var(--white);margin-bottom:4px}
.gc-desc{font-size:13px;color:#aaa;font-family:var(--font-jp);line-height:1.5}
.gc-arr{font-size:20px;color:#555;margin-left:auto;flex-shrink:0}
.game-card:hover .gc-arr{color:var(--red)}
.gc-badge{background:var(--gold);color:var(--dark);font-family:var(--font-en);font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;display:inline-block;margin-top:3px}
#spoker{align-items:stretch;justify-content:flex-start;overflow:hidden;background:linear-gradient(180deg,#0b2e0b 0%,#082008 100%);padding:0}
.pt{background:linear-gradient(180deg,#001a00,#002a00);width:100%;border-bottom:2px solid #FFD700;padding:3px 6px 2px;flex-shrink:0}
.pt-inner{display:flex;flex-direction:column;gap:0}
.pt-hdr{display:flex;margin-bottom:2px}
.pt-hb{width:44px;text-align:center;font-family:var(--font-en);font-size:10px;font-weight:900;color:#FFD700;letter-spacing:.02em}
.pt-row{display:flex;align-items:center;padding:1px 2px;border-bottom:1px solid rgba(0,100,0,.4);transition:all .2s}
.pt-row.hi{background:rgba(255,215,0,.25);box-shadow:inset 0 0 8px rgba(255,215,0,.3)}
.pt-n{flex:1;color:#00FF41;font-family:var(--font-en);font-size:11px;font-weight:700;letter-spacing:.03em;text-shadow:0 0 4px rgba(0,255,65,.4)}
.pt-odds{display:flex;gap:2px}
.pt-o{width:44px;text-align:center;font-family:var(--font-en);font-size:11px;font-weight:900;color:#aaa;padding:1px 0}
.pt-o.cur{color:#FFD700;text-shadow:0 0 6px rgba(255,215,0,.8);background:rgba(255,215,0,.12)}
.pt-o.mx{color:#FF4444;text-shadow:0 0 8px rgba(255,68,68,1);background:rgba(180,0,0,.35);border:1px solid rgba(255,60,60,.5);border-radius:3px;font-size:13px}
/* ===== HUD ===== */
.pk-hud{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;background:linear-gradient(180deg,#000,#001200);border-top:2px solid #333;flex-shrink:0;gap:6px}
.pk-hud-col{display:flex;flex-direction:column;align-items:center;flex:1}
.pk-lbl{font-family:var(--font-en);font-size:11px;font-weight:900;letter-spacing:.2em;color:#00FF41;text-shadow:0 0 4px rgba(0,255,65,.5)}
.pk-val{font-family:var(--font-en);font-size:36px;font-weight:900;line-height:1;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,.6)}
.pk-hud-col.m .pk-val{color:#FFD700}
.pk-hud-col.w .pk-val{color:#00FF41;text-shadow:0 0 10px rgba(0,255,65,.6)}
/* ===== WAGER 目立たせ ===== */
.pk-hud-col.b{
  flex:none;
  background:rgba(0,200,220,.1);
  border:2px solid rgba(0,220,255,.5);
  border-radius:10px;
  padding:4px 20px 6px;
  position:relative;
  box-shadow:0 0 12px rgba(0,200,255,.2),inset 0 0 8px rgba(0,150,200,.1);
}
.pk-hud-col.b .pk-lbl{
  color:#00DDFF;
  font-size:13px;
  letter-spacing:.3em;
  text-shadow:0 0 10px rgba(0,220,255,.9);
}
.pk-hud-col.b .pk-val{
  color:#00FFFF;
  font-size:56px;
  line-height:1;
  text-shadow:0 0 20px rgba(0,255,255,1),0 0 40px rgba(0,200,255,.6);
}
/* カード */
.ca{display:flex;gap:8px;padding:14px 8px 8px;justify-content:center;flex-shrink:0}
.cw{display:flex;flex-direction:column;align-items:center;gap:6px}
.card{width:90px;height:128px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;border:3px solid #888;box-shadow:0 6px 18px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.15)}
.card.up{background:linear-gradient(135deg,#fffef8,#fff9e6)}
.card.up.r{color:#C00000}
.card.up.b{color:#0D1B8F}
.card.dn{background:radial-gradient(ellipse at 50% 50%,#1a3a7a,#0a1848);border-color:#4488ff;box-shadow:0 6px 18px rgba(0,0,0,.8)}
.card.hd{transform:translateY(-14px);border-color:#FFD700;box-shadow:0 0 20px rgba(255,215,0,.9),0 8px 20px rgba(0,0,0,.5)}
.card.wg{animation:wgA .5s ease infinite alternate}
@keyframes wgA{0%{box-shadow:0 0 12px rgba(255,215,0,.5)}100%{box-shadow:0 0 30px rgba(255,215,0,1),0 0 50px rgba(255,215,0,.6)}}
.ct{position:absolute;top:5px;left:7px;font-family:Georgia,serif;font-size:18px;font-weight:900;line-height:1.1;z-index:2}
.cs{font-size:44px;line-height:1}
.cb{position:absolute;bottom:5px;right:7px;font-family:Georgia,serif;font-size:18px;font-weight:900;line-height:1.1;transform:rotate(180deg);z-index:2}
.hl-lbl{font-family:var(--font-en);font-size:12px;font-weight:900;color:#FFD700;min-height:16px;text-shadow:0 0 8px rgba(255,215,0,.8);letter-spacing:.1em}
.hl-lbl.hid{visibility:hidden}
.rd{text-align:center;padding:6px 8px;min-height:50px;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,20,0,.4))}
.rn{font-family:var(--font-en);font-weight:900;font-size:clamp(22px,5vw,32px);color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,1),0 0 40px rgba(255,165,0,.7);animation:pop .28s cubic-bezier(.36,2,.5,1);letter-spacing:.05em}
.rw{font-size:20px;color:#00FF41;font-family:var(--font-en);font-weight:900;letter-spacing:.1em;text-shadow:0 0 10px rgba(0,255,65,.8)}
.rz{font-size:14px;color:#4a9a4a;font-family:var(--font-en);font-weight:700;letter-spacing:.12em}
@keyframes pop{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pk-btns{display:flex;gap:7px;padding:6px 10px 8px;flex-shrink:0;background:linear-gradient(180deg,#001200,#000)}
.bg{display:flex;gap:5px;align-items:center}
.bb{background:linear-gradient(180deg,#333,#222);border:2px solid #666;border-radius:8px;color:#FFD700;font-family:var(--font-en);font-size:18px;font-weight:900;padding:11px 18px;cursor:pointer;transition:all .1s;box-shadow:0 3px 0 #000}
.bb:hover{background:linear-gradient(180deg,#444,#333);border-color:#FFD700}
.bb:active{transform:scale(.94)}
.bb:disabled{opacity:.25;cursor:not-allowed}
.bm{background:linear-gradient(180deg,#FF2200,#CC0000);color:#fff;border:none;border-radius:8px;font-family:var(--font-en);font-size:12px;font-weight:900;padding:11px 13px;cursor:pointer;box-shadow:0 4px 0 #660000;transition:all .1s;letter-spacing:.05em}
.bm:active{transform:translateY(3px)}
.bm:disabled{opacity:.25;cursor:not-allowed}
.db{flex:1;background:linear-gradient(180deg,#FFE000,#FFB300);color:#000;border:none;border-radius:8px;font-family:var(--font-en);font-size:22px;font-weight:900;padding:14px;cursor:pointer;box-shadow:0 5px 0 #886000,0 0 20px rgba(255,215,0,.4);letter-spacing:.08em;transition:all .1s}
.db:active{transform:translateY(4px);box-shadow:0 1px 0 #B37700}
.db:disabled{opacity:.25;cursor:not-allowed}
#supgame{display:none;flex-direction:column;flex:1;position:relative;z-index:1;background:linear-gradient(180deg,#000800 0%,#001500 60%,#000800 100%);}
#supgame.active{display:flex}
.du-title-bar{background:linear-gradient(90deg,#000,#001a00,#000);border-top:2px solid #00aa00;border-bottom:2px solid #00aa00;padding:5px 16px;text-align:center;flex-shrink:0;}
.du-title{font-family:var(--font-en);font-size:clamp(16px,3.5vw,22px);font-weight:900;color:#00FF41;letter-spacing:.25em;text-shadow:0 0 12px rgba(0,255,65,.8),0 0 24px rgba(0,255,65,.4);}
.du-win-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 16px;background:rgba(0,0,0,.5);flex-shrink:0;}
.du-win-lbl{font-family:var(--font-en);font-size:11px;font-weight:900;color:#00FF41;letter-spacing:.2em}
.du-win-val{font-family:var(--font-en);font-size:38px;font-weight:900;color:#FFD700;text-shadow:0 0 16px rgba(255,215,0,.9);line-height:1}
.du-win-unit{font-family:var(--font-en);font-size:13px;color:rgba(255,215,0,.7)}
.du-cards-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 12px;}
.du-dealer-side{display:flex;flex-direction:column;align-items:center;gap:6px;margin-right:20px;}
.du-side-lbl{font-family:var(--font-en);font-size:13px;font-weight:900;letter-spacing:.18em;color:#00aaff;text-shadow:0 0 8px rgba(0,170,255,.6);}
.du-player-side{display:flex;flex-direction:column;align-items:center;gap:6px;}
.du-player-lbl{font-family:var(--font-en);font-size:13px;font-weight:900;letter-spacing:.18em;color:#FFD700;text-shadow:0 0 8px rgba(255,215,0,.6);}
.du-player-cards{display:flex;gap:10px;}
.duc{width:80px;height:112px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,box-shadow .15s;position:relative;border:2px solid #666;box-shadow:0 5px 16px rgba(0,0,0,.8);overflow:hidden}
.duc.up{background:linear-gradient(135deg,#fffff8,#fff9e6)}
.duc.up.r{color:#C00000}
.duc.up.b{color:#0D1B8F}
.duc.dn{background:radial-gradient(ellipse at 50% 40%,#1a3a7a,#0a1848);border-color:#4488ff;}
.duc.dn::before{content:'★ ★ ★';position:absolute;top:5px;font-size:8px;color:rgba(100,160,255,.5);letter-spacing:4px;}
.duc.dn::after{content:'★';font-size:32px;color:rgba(100,160,255,.55);text-shadow:0 0 8px rgba(100,160,255,.7);}
.duc:hover:not(.dn){transform:translateY(-5px)}
.duc.sel{border-color:#FFD700;box-shadow:0 0 22px rgba(255,215,0,.9);transform:translateY(-8px);}
.duc.rwin{border-color:#00FF41;box-shadow:0 0 24px rgba(0,255,65,.9);animation:winPulse .5s ease infinite alternate;}
@keyframes winPulse{0%{box-shadow:0 0 14px rgba(0,255,65,.7)}100%{box-shadow:0 0 32px rgba(0,255,65,1)}}
.duc.rlose{border-color:#FF4444;box-shadow:0 0 18px rgba(255,68,68,.8);opacity:.7;}
.duc.dealer-open{border-color:#00aaff;box-shadow:0 0 18px rgba(0,170,255,.6);}
.duc-ct{position:absolute;top:5px;left:7px;font-family:Georgia,serif;font-size:20px;font-weight:900;line-height:1.1}
.duc-cs{font-size:40px;line-height:1;display:flex;align-items:center;justify-content:center}
.duc-cb{position:absolute;bottom:5px;right:7px;font-family:Georgia,serif;font-size:20px;font-weight:900;line-height:1.1;transform:rotate(180deg)}
.du-msg{text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:4px 12px;}
.du-msg-txt{font-family:var(--font-en);font-size:clamp(16px,4vw,24px);font-weight:900;color:#888;letter-spacing:.08em;}
.du-msg-txt.win{color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,1);animation:pop .3s ease}
.du-msg-txt.lose{color:#FF4444;text-shadow:0 0 16px rgba(255,68,68,.8);animation:shake .4s ease}
.du-msg-txt.info{color:#00FF41;text-shadow:0 0 8px rgba(0,255,65,.5)}
.du-btn-area{background:linear-gradient(180deg,#000,#0a0a0a);border-top:3px solid #00aa00;padding:10px 12px 14px;flex-shrink:0;}
.du-btn-row{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.du-btn{border:none;border-radius:6px;cursor:pointer;transition:all .08s;font-family:var(--font-en);font-weight:900;letter-spacing:.08em;position:relative;overflow:hidden;}
.du-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,.12);pointer-events:none;}
.du-btn:active{transform:translateY(3px)}
.du-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.du-btn-double{flex:1;background:linear-gradient(180deg,#CC0000,#880000);color:#fff;font-size:clamp(13px,2.5vw,16px);padding:14px 10px;box-shadow:0 5px 0 #440000;border-top:2px solid #FF4444;}
.du-btn-half{flex:1;background:linear-gradient(180deg,#E65100,#993500);color:#fff;font-size:clamp(13px,2.5vw,16px);padding:14px 10px;box-shadow:0 5px 0 #552000;border-top:2px solid #FF8C00;}
.du-btn-collect{flex:1;background:linear-gradient(180deg,#1B5E20,#0D3B11);color:#fff;font-size:clamp(13px,2.5vw,16px);padding:14px 10px;box-shadow:0 5px 0 #061A08;border-top:2px solid #00FF41;}
.du-btn-lbl{display:block;font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.1em;margin-top:3px}
.du-hud{display:flex;justify-content:space-between;align-items:center;padding:5px 14px 0;}
.du-hud-col{display:flex;flex-direction:column;align-items:center}
.du-hud-lbl{font-family:var(--font-en);font-size:11px;font-weight:900;letter-spacing:.2em;color:#00FF41}
.du-hud-val{font-family:var(--font-en);font-size:28px;font-weight:900;color:#FFD700;text-shadow:0 0 8px rgba(255,215,0,.6);line-height:1.1}
@keyframes flipIn{0%{transform:rotateY(90deg) scale(.8);opacity:0}60%{transform:rotateY(-8deg) scale(1.05)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.duc.flip{animation:flipIn .4s cubic-bezier(.25,1.4,.5,1) forwards}
@keyframes dealerIn{0%{transform:scale(.3) rotate(-10deg);opacity:0}70%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.duc.dealer-anim{animation:dealerIn .45s cubic-bezier(.25,1.4,.5,1) forwards}
.ctrl{background:linear-gradient(180deg,#000,#001000);border-top:2px solid #333;padding:8px 14px 12px;display:flex;gap:8px;justify-content:center;flex-shrink:0}
.ctrl.hidden{display:none}
.cbtn{border:2px solid #555;border-radius:6px;font-family:var(--font-en);font-weight:900;font-size:13px;padding:11px 24px;cursor:pointer;background:linear-gradient(180deg,#333,#222);color:#aaa;box-shadow:0 3px 0 #000;transition:all .1s;letter-spacing:.05em}
.cbtn:active{transform:translateY(3px)}
#daily-bonus-notice{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.5);background:var(--dark2);border:4px solid var(--gold);border-radius:14px;padding:22px 32px;text-align:center;font-family:var(--font-jp);font-weight:900;color:var(--white);z-index:9999;animation:bonusPop .5s cubic-bezier(.36,2,.5,1) forwards}
@keyframes bonusPop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}70%{transform:translate(-50%,-50%) scale(1.06)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
/* ===== 画面フラッシュオーバーレイ ===== */
#screen-flash{position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:0;transition:opacity .06s}
/* ===== 当選カード点滅 ===== */
@keyframes cardBlink{0%,100%{opacity:1;box-shadow:0 0 28px rgba(255,215,0,1),0 0 55px rgba(255,165,0,.7)}50%{opacity:.5;box-shadow:0 0 6px rgba(255,215,0,.3)}}
.card.blink{animation:cardBlink .32s ease infinite !important}
/* ===== WINカウントアップ数字ポップ ===== */
@keyframes numPop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
.rw-anim{display:inline-block;animation:numPop .25s cubic-bezier(.36,2,.5,1)}
/* ===== 大役BGフラッシュ ===== */
@keyframes bigWinBg{0%,100%{background:linear-gradient(180deg,#0a1a0a,#051005)}33%{background:linear-gradient(180deg,#1a0a00,#0a0400)}66%{background:linear-gradient(180deg,#001a08,#000904)}}
#spoker.bigwin-fx{animation:bigWinBg .55s ease 4}
/* ===== ダブルアップ選択グロー ===== */
.duc.sel-glow{box-shadow:0 0 28px rgba(255,215,0,1),0 0 56px rgba(255,200,0,.6) !important;border-color:#FFD700 !important}
/* ===== 実機風ボトムバー ===== */
.pk-arcade-bar{
  display:flex;align-items:stretch;
  background:#000;
  border-top:3px solid #004400;
  border-bottom:2px solid #004400;
  flex-shrink:0;
  min-height:54px;
}
.pk-bar-left,.pk-bar-right{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 16px;min-width:100px;
  background:#001a00;
  border-right:2px solid #004400;
}
.pk-bar-right{border-right:none;border-left:2px solid #004400;}
.pk-bar-lbl{font-family:var(--font-en);font-size:10px;font-weight:900;color:#00AA00;letter-spacing:.2em;}
.pk-bar-wager{font-family:var(--font-en);font-size:40px;font-weight:900;color:#00FFFF;text-shadow:0 0 14px rgba(0,255,255,.9),0 0 28px rgba(0,200,255,.5);line-height:1}
.pk-bar-credits{font-family:var(--font-en);font-size:28px;font-weight:900;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,.7);line-height:1}
.pk-bar-center{flex:1;display:flex;align-items:center;justify-content:center;}
.pk-bar-status{
  font-family:var(--font-en);font-size:clamp(18px,3.5vw,28px);font-weight:900;
  color:#FF2222;text-shadow:0 0 16px rgba(255,0,0,.9),0 0 32px rgba(200,0,0,.5);
  letter-spacing:.12em;text-align:center;
}
.pk-bar-status.win{color:#FFD700;text-shadow:0 0 16px rgba(255,215,0,1),0 0 32px rgba(255,165,0,.6);animation:pop .3s ease}
.pk-bar-status.info{color:#00FF41;text-shadow:0 0 10px rgba(0,255,65,.7);}
.pk-bar-status.idle{color:#FF2222;}
/* WIN枚数バー */
.pk-win-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(180deg,#001a00,#002800);
  border-bottom:2px solid #004400;
  padding:4px 0;flex-shrink:0;
}
.pk-win-lbl{font-family:var(--font-en);font-size:11px;font-weight:900;color:#00FF41;letter-spacing:.2em;}
/* スマホ対応 */
@media(max-width:600px){
  .pk-bar-wager{font-size:28px !important}
  .pk-bar-credits{font-size:20px !important}
  .pk-bar-status{font-size:16px !important}
  .pk-bar-left,.pk-bar-right{min-width:70px !important;padding:4px 8px !important}
  .pk-arcade-bar{min-height:44px !important}
}
/* JOKERカード */
.card.joker-card{background:linear-gradient(135deg,#faf0ff,#ecdeff,#ffe0fa) !important;border-color:#aa00dd !important;box-shadow:0 0 18px rgba(170,0,221,.6),0 6px 18px rgba(0,0,0,.7) !important;overflow:hidden}
.duc.joker-card{background:linear-gradient(135deg,#faf0ff,#ecdeff,#ffe0fa) !important;border-color:#aa00dd !important;box-shadow:0 0 18px rgba(170,0,221,.6) !important}
/* フェイスカード (K/Q/J) アートワーク */
/* フェイスカード (K/Q/J) レイアウト */
.card-face{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
  z-index:1;
}
/* 中央の大文字ランク */
.cf-rank{
  font-family:Georgia,'Times New Roman',serif;
  font-weight:900;
  font-size:52px;
  line-height:1;
  letter-spacing:-.02em;
  text-shadow:1px 1px 0 rgba(0,0,0,.08);
}
/* 中央スート */
.cf-suit{
  font-size:24px;
  line-height:1;
  margin-top:1px;
  opacity:.9;
}

}

.card.up.r.face-card{background:linear-gradient(160deg,#fffaf8 60%,#fff0ec) !important}
.card.up.b.face-card{background:linear-gradient(160deg,#f8f9ff 60%,#ecf0ff) !important}
/* 内側の細い枠線（本物のトランプっぽく） */
.card.up.face-card::before{
  content:'';
  position:absolute;
  inset:5px;
  border:1.5px solid currentColor;
  border-radius:3px;
  opacity:.20;
  pointer-events:none;
  z-index:0;
}
</style>
<script>
// HKG: ロビーからの認証チェック
(function(){
  try{
    var u=JSON.parse(localStorage.getItem('hkg_user')||'null');
    if(u&&u.name){
      // ログイン済み: グローバルにセット
      window.__hkgUser=u;
      // ポーカーゲームが使う変数を上書き
      Object.defineProperty(window,'_skipLogin',{value:true,writable:false});
    } else {
      // 未ログイン: ロビーへ
      location.href='index.html';
    }
  }catch(e){}
})();
</script>
