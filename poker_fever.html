<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百式ゲーム王国</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Boogaloo&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffdd00;--grn:#11dd55;--red:#ff3333;--blu:#00aaff;--pnk:#ff44cc;--ora:#ff8800;--pur:#9944ff;}
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(160deg,#1a0533,#0a0018 50%,#001030);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;font-family:'Boogaloo',cursive;overflow-y:auto;overflow-x:hidden;padding:12px 0 24px}
.cab{width:min(480px,99vw);background:linear-gradient(170deg,#1e0a44,#0e0428 60%,#080818);border-radius:20px;border:3px solid var(--pur);box-shadow:0 0 0 1px #bb66ff,0 0 40px rgba(120,0,255,.5);display:flex;flex-direction:column}
.mq{background:rgba(0,0,0,.5);border-bottom:2px solid var(--pur);padding:5px 0;overflow:hidden;position:relative}
.mq::before,.mq::after{content:'';position:absolute;top:0;bottom:0;width:16px;z-index:2}
.mq::before{left:0;background:linear-gradient(90deg,rgba(0,0,0,.8),transparent)}
.mq::after{right:0;background:linear-gradient(-90deg,rgba(0,0,0,.8),transparent)}
.mq-inner{display:flex;width:max-content;animation:mqs 14s linear infinite}
@keyframes mqs{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mq-inner span{font-family:'Zen Dots',cursive;font-size:12px;padding:0 20px;white-space:nowrap;background:linear-gradient(90deg,var(--gold),var(--pnk),var(--blu),var(--grn),var(--gold));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rb 3s linear infinite}
@keyframes rb{0%{background-position:0%}100%{background-position:200%}}
.tp{background:rgba(0,0,0,.4);padding:10px 16px 8px;text-align:center;border-bottom:2px solid var(--pur)}
.led-row{display:flex;justify-content:center;gap:5px;margin-bottom:6px}
.led{width:8px;height:8px;border-radius:50%;animation:lp 1.2s ease-in-out infinite}
.la{background:var(--red);box-shadow:0 0 5px var(--red)}.lb{background:var(--ora);box-shadow:0 0 5px var(--ora);animation-delay:.1s}.lc{background:var(--gold);box-shadow:0 0 5px var(--gold);animation-delay:.2s}.ld{background:var(--grn);box-shadow:0 0 5px var(--grn);animation-delay:.3s}.le{background:var(--blu);box-shadow:0 0 5px var(--blu);animation-delay:.4s}.lf{background:var(--pnk);box-shadow:0 0 5px var(--pnk);animation-delay:.5s}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.6)}}
.cab-title{font-family:'Zen Dots',cursive;font-size:clamp(14px,4vw,22px);line-height:1.4;background:linear-gradient(135deg,#fff,var(--gold) 40%,var(--pnk) 70%,var(--blu));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cab-sub{font-size:9px;color:rgba(180,140,255,.5);letter-spacing:.2em;font-family:'Zen Dots',cursive;margin-top:2px}
.screen{background:linear-gradient(180deg,#120030,#080018);position:relative;overflow:hidden;min-height:520px;display:flex;flex-direction:column}
.screen::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:200;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px)}
.fl{position:absolute;left:0;right:0;height:2px;background:rgba(150,80,255,.07);animation:scan 9s linear infinite;pointer-events:none;z-index:201}
@keyframes scan{0%{top:-2px;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:110%;opacity:0}}
.gs{display:none;flex-direction:column;flex:1;position:relative;z-index:1}.gs.active{display:flex}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* LOGIN */
#slogin{align-items:center;justify-content:center;gap:14px;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(100,0,200,.4),transparent 70%)}
.login-logo{font-family:'Zen Dots',cursive;font-size:clamp(22px,6vw,34px);text-align:center;line-height:1.5;background:linear-gradient(135deg,var(--gold),var(--pnk),var(--blu));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box{background:rgba(255,255,255,.07);border:2px solid rgba(150,100,255,.4);border-radius:16px;padding:16px;width:100%;max-width:320px}
.login-tabs{display:flex;margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid rgba(150,100,255,.3)}
.login-tab{flex:1;padding:8px;text-align:center;font-family:'Zen Dots',cursive;font-size:11px;cursor:pointer;background:rgba(255,255,255,.05);color:rgba(200,160,255,.6);transition:all .1s}
.login-tab.active{background:rgba(100,0,200,.4);color:#fff}
.login-box-title{font-family:'Zen Dots',cursive;font-size:11px;color:rgba(200,160,255,.65);margin-bottom:10px;text-align:center}
.login-input{background:rgba(255,255,255,.1);border:2px solid rgba(150,100,255,.4);border-radius:10px;color:#fff;font-family:'Boogaloo',cursive;font-size:20px;padding:10px 14px;width:100%;outline:none;margin-bottom:10px}
.login-input:focus{border-color:var(--gold)}.login-input::placeholder{color:rgba(200,160,255,.35)}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.pin-dot{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(150,100,255,.4);font-size:20px;color:rgba(150,100,255,.4);display:flex;align-items:center;justify-content:center}
.pin-dot.filled{background:rgba(100,0,200,.5);border-color:var(--pnk);color:var(--pnk)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:240px;margin:0 auto}
.nb{background:rgba(255,255,255,.1);border:1px solid rgba(150,100,255,.3);border-radius:12px;color:#fff;font-family:'Zen Dots',cursive;font-size:18px;padding:12px;cursor:pointer;transition:all .1s}
.nb:active{background:rgba(150,100,255,.3);transform:scale(.95)}.nb:disabled{opacity:.4;cursor:not-allowed}
.nb-del{background:rgba(255,80,80,.12);border-color:rgba(255,80,80,.3);font-size:12px}
.nb-ok{background:rgba(255,220,0,.12);border-color:rgba(255,220,0,.4);color:var(--gold);font-size:12px}
.login-msg{font-size:13px;text-align:center;min-height:20px;margin-top:6px}
.login-msg.ok{color:var(--grn)}.login-msg.err{color:var(--red);animation:shake .3s ease}.login-msg.ing{color:var(--gold);animation:blk .8s step-end infinite}

/* LOBBY */
#slobby{align-items:center;justify-content:flex-start;overflow-y:auto}
.lobby-hdr{background:rgba(0,0,0,.5);padding:14px 16px;width:100%;display:flex;align-items:center;gap:12px;border-bottom:2px solid rgba(120,0,255,.4)}
.lobby-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#6600cc,#cc0066);display:flex;align-items:center;justify-content:center;font-family:'Zen Dots',cursive;font-size:20px;color:#fff;border:2px solid rgba(255,200,0,.5)}
.lobby-name{font-family:'Zen Dots',cursive;font-size:16px;color:#fff;margin-bottom:2px}
.lobby-medals{font-family:'Zen Dots',cursive;font-size:18px;color:var(--gold);text-shadow:0 0 8px rgba(255,220,0,.4)}
.lobby-logout{background:rgba(255,255,255,.07);border:1px solid rgba(200,160,255,.3);color:rgba(200,160,255,.55);border-radius:50px;font-family:'Boogaloo',cursive;font-size:12px;padding:6px 14px;cursor:pointer;margin-left:auto}
.lobby-body{display:flex;flex-direction:column;gap:10px;padding:14px;width:100%}
.lobby-sec{font-family:'Zen Dots',cursive;font-size:10px;color:rgba(200,160,255,.4);letter-spacing:.2em;margin-bottom:2px}
.game-card{background:rgba(255,255,255,.07);border:2px solid rgba(150,100,255,.3);border-radius:18px;padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.game-card:hover{border-color:rgba(200,150,255,.6);transform:translateY(-2px);box-shadow:0 8px 24px rgba(100,0,200,.3)}
.game-card:active{transform:translateY(1px)}
.gc-inner{display:flex;align-items:center;gap:14px}
.gc-icon{font-size:48px;filter:drop-shadow(0 0 12px rgba(255,200,0,.4));flex-shrink:0}
.gc-name{font-family:'Zen Dots',cursive;font-size:15px;color:#fff;margin-bottom:4px}
.gc-desc{font-size:12px;color:rgba(200,160,255,.6);line-height:1.5}
.gc-arr{font-size:22px;color:rgba(200,160,255,.4);margin-left:auto}
.poker-c{border-color:rgba(255,200,0,.35)}.janken-c{border-color:rgba(255,68,204,.35)}

/* POKER */
#spoker{align-items:center;justify-content:flex-start;overflow:hidden}
.pt{background:rgba(0,0,0,.5);width:100%;border-bottom:2px solid rgba(100,0,200,.3);padding:8px 10px;flex-shrink:0}
.pt-inner{display:flex;flex-direction:column;gap:1px;min-width:300px}
.pt-hdr{display:flex;margin-bottom:2px}
.pt-hb{width:30px;text-align:center;font-family:'Zen Dots',cursive;font-size:9px;color:rgba(200,160,255,.4)}
.pt-row{display:flex;align-items:center;padding:2px 4px;border-radius:4px;border:1px solid transparent;transition:all .2s}
.pt-row.hi{background:rgba(255,220,0,.18);border-color:rgba(255,220,0,.5)}
.pt-n{flex:1;color:rgba(200,160,255,.75);font-family:'Boogaloo',cursive;font-size:12px}
.pt-odds{display:flex;gap:3px}
.pt-o{width:30px;text-align:center;font-family:'Zen Dots',cursive;font-size:10px;color:rgba(200,160,255,.4);background:rgba(255,255,255,.04);border-radius:3px;padding:1px 0}
.pt-o.cur{color:var(--gold);background:rgba(255,220,0,.14)}.pt-o.mx{color:var(--red);background:rgba(255,50,50,.12)}
.pk-hud{display:flex;justify-content:space-between;padding:6px 12px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(100,0,200,.3);flex-shrink:0}
.pk-hud-col{display:flex;flex-direction:column;align-items:center}
.pk-lbl{font-size:9px;letter-spacing:.15em;font-family:'Zen Dots',cursive;opacity:.5}
.pk-val{font-size:26px;font-family:'Zen Dots',cursive;line-height:1}
.pk-hud-col.m .pk-lbl,.pk-hud-col.m .pk-val{color:var(--gold);text-shadow:0 0 8px rgba(255,220,0,.4)}
.pk-hud-col.w .pk-lbl,.pk-hud-col.w .pk-val{color:var(--grn);text-shadow:0 0 8px rgba(17,221,85,.3)}
.ca{display:flex;gap:5px;padding:10px 8px 4px;justify-content:center;flex-shrink:0}
.cw{display:flex;flex-direction:column;align-items:center;gap:4px}
.card{width:60px;height:86px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;border:2px solid rgba(255,255,255,.12);box-shadow:0 4px 12px rgba(0,0,0,.6)}
.card.up{background:linear-gradient(135deg,#fff,#f0f0ff)}.card.up.r{color:#cc0000}.card.up.b{color:#111133}
.card.dn{background:linear-gradient(135deg,#2a0860,#160430)}.card.dn::after{content:'🃏';font-size:26px;opacity:.3}
.card.hd{transform:translateY(-10px);border-color:var(--gold);box-shadow:0 0 16px rgba(255,220,0,.6),0 4px 12px rgba(0,0,0,.6)}
.card.wg{animation:wg .5s ease infinite alternate}
@keyframes wg{0%{box-shadow:0 0 8px rgba(255,220,0,.4)}100%{box-shadow:0 0 28px rgba(255,220,0,1)}}
.ct{position:absolute;top:4px;left:6px;font-family:'Zen Dots',cursive;font-size:13px;line-height:1.2}
.cs{font-size:26px;line-height:1}
.cb{position:absolute;bottom:4px;right:6px;font-family:'Zen Dots',cursive;font-size:13px;line-height:1.2;transform:rotate(180deg)}
.hl{font-family:'Zen Dots',cursive;font-size:10px;color:var(--gold);min-height:14px}
.hl.h{visibility:hidden}
.rd{text-align:center;padding:4px 8px;min-height:46px;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0}
.rn{font-family:'Zen Dots',cursive;font-size:clamp(16px,4.5vw,24px);color:var(--gold);text-shadow:0 0 16px rgba(255,220,0,.7);animation:pop .3s ease}
.rw{font-size:13px;color:var(--grn);font-family:'Zen Dots',cursive}
.rz{font-size:15px;color:rgba(200,160,255,.4);font-family:'Boogaloo',cursive}
.pk-btns{display:flex;gap:8px;padding:6px 10px 10px;flex-shrink:0}
.bg{display:flex;gap:5px;align-items:center}
.bb{background:rgba(255,255,255,.16);border:2px solid rgba(220,180,255,.55);border-radius:14px;color:#fff;font-family:'Zen Dots',cursive;font-size:20px;padding:14px 20px;cursor:pointer;transition:all .1s}
.bb:hover{background:rgba(255,255,255,.14)}.bb:active{transform:scale(.95)}.bb:disabled{opacity:.25;cursor:not-allowed}
.bm{background:linear-gradient(160deg,#cc0044,#880022);color:#fff;border:none;border-radius:10px;font-family:'Zen Dots',cursive;font-size:11px;padding:10px;cursor:pointer;box-shadow:0 3px 0 #440011;transition:all .1s}
.bm:active{transform:translateY(2px);box-shadow:0 1px 0 #440011}.bm:disabled{opacity:.25;cursor:not-allowed}
.db{flex:1;background:linear-gradient(160deg,var(--gold),var(--ora));color:#1a0800;border:none;border-radius:50px;font-family:'Zen Dots',cursive;font-size:23px;padding:17px;cursor:pointer;box-shadow:0 8px 0 #886600;transition:all .1s}
.db:active{transform:translateY(4px);box-shadow:0 1px 0 #884400}.db:disabled{opacity:.25;cursor:not-allowed}

/* UP GAME */
#supgame{align-items:center;justify-content:center;gap:10px;padding:12px 10px;background:radial-gradient(ellipse at 50% 30%,rgba(0,80,180,.3),rgba(10,0,40,.5) 70%)}
.ug-hdr{font-family:'Zen Dots',cursive;font-size:clamp(14px,4vw,20px);color:var(--gold);text-align:center}
.ug-info{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.ug-box{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:12px;padding:7px 14px;text-align:center}
.ug-bl{font-size:10px;color:rgba(200,160,255,.55);letter-spacing:.1em;font-family:'Zen Dots',cursive}
.ug-bv{font-family:'Zen Dots',cursive;line-height:1.1}
.sg{background:rgba(255,255,255,.06);border:1px solid rgba(150,100,255,.2);border-radius:8px;padding:6px 12px;font-size:10px;color:rgba(200,160,255,.5);font-family:'Zen Dots',cursive;text-align:center}
.ug-cards{display:flex;align-items:center;gap:10px;justify-content:center}
.ug-l{display:flex;flex-direction:column;align-items:center;gap:4px}
.ug-r{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.uc{width:60px;height:84px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;border:2px solid rgba(255,255,255,.1);box-shadow:0 4px 12px rgba(0,0,0,.6)}
.uc.up{background:linear-gradient(135deg,#fff,#f0f0ff)}.uc.up.r{color:#cc0000}.uc.up.b{color:#111133}
.uc.dn{background:linear-gradient(135deg,#1a0440,#0a0220)}.uc.dn::after{content:'？';font-size:22px;color:rgba(150,100,255,.25);font-family:'Zen Dots',cursive}
.uc.sel{border-color:var(--gold);box-shadow:0 0 16px rgba(255,220,0,.6)}
.uc.rw{border-color:var(--grn);box-shadow:0 0 16px rgba(17,221,85,.7)}
.uc.rl{border-color:var(--red);box-shadow:0 0 16px rgba(255,50,50,.7)}
.uc.lo{border-color:var(--blu);box-shadow:0 0 12px rgba(0,170,255,.4)}
.ug-ll{font-size:10px;font-family:'Zen Dots',cursive;color:rgba(200,160,255,.55);min-height:14px}
.ug-ls{font-size:10px;color:rgba(255,220,0,.5);font-family:'Zen Dots',cursive;text-align:center}
.ug-res{font-family:'Boogaloo',cursive;font-size:clamp(16px,4.5vw,24px);min-height:32px;text-align:center;color:rgba(200,160,255,.45)}
.ug-res.ok{color:var(--gold);text-shadow:0 0 12px rgba(255,220,0,.6)}.ug-res.ng{color:var(--red);animation:shake .4s ease}
.ug-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.ub{border:none;border-radius:50px;font-family:'Zen Dots',cursive;font-size:12px;padding:11px 16px;cursor:pointer;transition:all .1s}
.ub:active{transform:translateY(3px)}.ub:disabled{opacity:.25;cursor:not-allowed}
.ud{background:linear-gradient(160deg,#ff4444,#cc1111);color:#fff;box-shadow:0 4px 0 #880000}
.uh{background:linear-gradient(160deg,#ff8800,#cc5500);color:#fff;box-shadow:0 4px 0 #882200}
.uq{background:linear-gradient(160deg,#11aa44,#008822);color:#fff;box-shadow:0 4px 0 #004411}

/* CTRL */
.ctrl{background:rgba(0,0,0,.4);border-top:2px solid var(--pur);border-radius:0 0 18px 18px;padding:10px 14px 14px;display:flex;gap:8px;justify-content:center}
.ctrl.hidden{display:none}
.cbtn{border:none;border-radius:50px;font-family:'Zen Dots',cursive;font-size:12px;padding:11px 22px;cursor:pointer;transition:all .1s;position:relative;overflow:hidden;background:linear-gradient(160deg,#8844ff,#5511cc);color:#fff;box-shadow:0 4px 0 #330088}
.cbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #330088}
</style>
<script>(function(){
  var u=null;
  try{u=JSON.parse(localStorage.getItem("hkg_user")||"null");}catch(e){}
  if(!u||!u.name){location.href="index.html";return;}
  if(!u.id){u.id="hkg-"+u.name;localStorage.setItem("hkg_user",JSON.stringify(u));}
  document.addEventListener("DOMContentLoaded",function(){
    // ロビーボタン
    var b=document.createElement("button");
    b.textContent="← ロビー";
    b.style.cssText="position:fixed;top:8px;left:8px;z-index:99999;background:rgba(0,0,0,.9);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 16px;font-size:14px;cursor:pointer;";
    b.onclick=function(){try{localStorage.setItem("hkg_user",JSON.stringify(user));}catch(e){}location.href="index.html";};
    document.body.appendChild(b);
    // 自動ログイン
    setTimeout(function(){
      var nf=document.getElementById("lname")||document.querySelector("input[type=text]");
      if(nf){nf.value=u.name;nf.dispatchEvent(new Event("input",{bubbles:true}));}
      var bs=Array.from(document.querySelectorAll("button"));
      ["1","2","3","4"].forEach(function(n){var b=bs.find(function(x){return x.textContent.trim()===n;});if(b)b.click();});
      setTimeout(function(){
        var ok=bs.find(function(x){return (x.textContent||"").trim().indexOf("OK")===0;});
        if(ok)ok.click();
        setTimeout(function(){
          var sb=document.getElementById("slobby");
          if(sb&&sb.classList.contains("active")){
            var els=Array.from(sb.querySelectorAll("*"));
            var tri=els.find(function(x){return (x.textContent||"").trim()==="▶";});
            if(tri)tri.click();
          }
          var side=document.getElementById("sidebar");
          if(side)side.style.display="none";
        },1000);
      },300);
    },300);
  });
})()</script></body>
</html>
