<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀 点数計算</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg,#0c0c0c 0%,#180808 55%,#0c0c14 100%);
    color: #e8e0d0; font-family: 'Noto Serif JP', 'Yu Mincho', Georgia, serif;
    min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 40px;
  }

  /* ヘッダー */
  .header {
    padding: 14px 16px 10px; border-bottom: 1px solid rgba(180,100,40,0.3);
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(180deg,rgba(180,40,20,0.12) 0%,transparent 100%);
  }
  .header-title { font-size: 18px; font-weight: 900; color: #e8341c; text-shadow: 0 0 14px rgba(232,52,28,0.5); }
  .header-sub { font-size: 11px; color: #b8906a; letter-spacing: 0.1em; margin-top: 2px; }

  /* APIキー設定 */
  .api-section {
    padding: 12px 14px; border-bottom: 1px solid rgba(180,100,40,0.2);
    display: flex; gap: 8px; align-items: center;
  }
  .api-input {
    flex: 1; padding: 8px 10px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(180,100,40,0.4); border-radius: 8px; color: #e8e0d0;
    font-size: 12px; font-family: monospace;
  }
  .api-save {
    padding: 8px 14px; background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.5); color: #ffd700; border-radius: 8px;
    font-size: 12px; cursor: pointer;
  }
  .api-ok { font-size: 11px; color: #6fda8a; }

  /* メイン */
  .main { padding: 16px 14px; display: flex; flex-direction: column; gap: 16px; }

  /* オプション */
  .opt-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .opt-label { font-size: 12px; color: #888; }
  .tog {
    padding: 8px 16px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(180,100,40,0.3); color: #888; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .tog.on-dealer { background: rgba(232,52,28,0.2); border-color: #e8341c; color: #ff8060; }
  .tog.on-tsumo  { background: rgba(41,128,185,0.2); border-color: #2980b9; color: #5dade2; }
  .tog.on-riichi { background: rgba(255,215,0,0.15); border-color: #ffd700; color: #ffd700; }

  /* 撮影 */
  .capture-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .photo-preview {
    width: 100%; border-radius: 12px; border: 2px solid rgba(180,100,40,0.4);
    max-height: 240px; object-fit: contain; background: #000; display: none;
  }
  .photo-placeholder {
    width: 100%; height: 160px; border: 1px dashed rgba(180,100,40,0.4);
    border-radius: 12px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: #555; font-size: 13px;
  }
  .capture-btns { display: flex; gap: 10px; width: 100%; }
  .cap-btn {
    flex: 1; padding: 14px 8px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(180,100,40,0.35); border-radius: 12px; cursor: pointer;
    font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: #e8e0d0;
  }
  .cap-btn span:first-child { font-size: 32px; }
  .cap-btn span:last-child { font-size: 12px; font-weight: 700; }

  /* 判定ボタン */
  .analyze-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg,rgba(232,52,28,0.45),rgba(180,100,40,0.35));
    border: 1px solid rgba(232,52,28,0.6); color: #fff; font-size: 16px; font-weight: 700;
    border-radius: 12px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 20px rgba(232,52,28,0.3); display: none;
  }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ローディング */
  .loading { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 24px; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(255,215,0,0.15);
    border-top-color: #ffd700; border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 結果 */
  .result { display: none; flex-direction: column; gap: 12px; }
  .hand-desc {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(180,100,40,0.2);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #c8b880; line-height: 1.6;
  }
  .section-title { font-size: 11px; color: #b8906a; letter-spacing: 0.15em; font-weight: 700; }
  .yaku-list {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(180,100,40,0.2);
    border-radius: 12px; overflow: hidden;
  }
  .yaku-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .yaku-item:last-child { border-bottom: none; }
  .yaku-name { font-size: 15px; color: #e8e0d0; font-weight: 600; }
  .yaku-han { font-size: 14px; font-weight: 900; color: #ffd700; }
  .yaku-han.yakuman { color: #ff6060; }

  .badges { display: flex; gap: 8px; }
  .badge {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(180,100,40,0.25); border-radius: 10px;
    padding: 9px 6px; text-align: center;
  }
  .badge.red { background: rgba(232,52,28,0.15); border-color: rgba(232,52,28,0.4); }
  .badge-label { font-size: 9px; color: #888; letter-spacing: 0.1em; margin-bottom: 3px; }
  .badge-val { font-size: 18px; font-weight: 900; color: #ffd700; line-height: 1; }
  .badge.red .badge-val { color: #ff8060; }
  .badge-sub { font-size: 9px; color: #b8906a; margin-top: 2px; }

  .pts-card {
    background: linear-gradient(135deg,rgba(180,50,20,0.18),rgba(40,15,5,0.4));
    border: 1px solid rgba(232,52,28,0.45); border-radius: 14px; padding: 16px;
    box-shadow: 0 4px 24px rgba(232,52,28,0.15);
  }
  .pts-title { font-size: 12px; color: #b8906a; margin-bottom: 12px; }
  .pts-grid { display: flex; gap: 10px; }
  .pts-box {
    flex: 1; background: rgba(0,0,0,0.35); border-radius: 9px;
    padding: 10px 6px; text-align: center;
  }
  .pts-lbl { font-size: 9px; color: #888; letter-spacing: 0.1em; margin-bottom: 4px; }
  .pts-val {
    font-size: 26px; font-weight: 900; color: #ffd700; line-height: 1;
    text-shadow: 0 0 16px rgba(255,215,0,0.4);
  }
  .pts-unit { font-size: 9px; color: #b8906a; margin-top: 2px; }
  .pts-total {
    margin-top: 10px; text-align: center; font-size: 11px; color: #666;
    border-top: 1px solid rgba(255,255,255,0.06); padding-top: 8px;
  }

  .err-box {
    background: rgba(255,50,30,0.08); border: 1px solid rgba(255,50,30,0.4);
    border-radius: 10px; padding: 14px; font-size: 13px; color: #ff8060; line-height: 1.6;
  }
  .retry-btn {
    padding: 12px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(180,100,40,0.3); color: #b8906a; border-radius: 10px;
    font-size: 13px; font-family: inherit; cursor: pointer; width: 100%;
  }

  input[type=file] { display: none; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <span style="font-size:28px">🀄</span>
  <div>
    <div class="header-title">麻雀 点数計算</div>
    <div class="header-sub">手牌を撮影 → 役・点数を自動判定</div>
  </div>
</div>

<!-- APIキー -->
<div class="api-section">
  <input class="api-input" id="apiKey" type="password" placeholder="Gemini APIキーを入力...">
  <button class="api-save" onclick="saveKey()">保存</button>
  <span class="api-ok" id="apiOk" style="display:none">✓ 設定済</span>
</div>

<!-- メイン -->
<div class="main">
  <!-- オプション -->
  <div class="opt-row">
    <span class="opt-label">あなたは</span>
    <button class="tog" id="togDealer" onclick="toggle('dealer')">子</button>
    <button class="tog" id="togTsumo"  onclick="toggle('tsumo')">ロン</button>
    <button class="tog" id="togRiichi" onclick="toggle('riichi')">リーチ</button>
    <button class="tog" id="togIppatsu" onclick="toggle('ippatsu')" style="display:none">一発</button>
    <button class="tog" id="togDbl"    onclick="toggle('dbl')" style="display:none">W立直</button>
  </div>

  <!-- 撮影 -->
  <div class="capture-area">
    <img id="preview" class="photo-preview" alt="手牌">
    <div id="placeholder" class="photo-placeholder">
      <span style="font-size:48px">🀄</span>
      <span>手牌を撮影またはアップロード</span>
    </div>
    <div class="capture-btns">
      <button class="cap-btn" onclick="document.getElementById('camInput').click()">
        <span>📷</span><span>カメラ撮影</span>
      </button>
      <button class="cap-btn" onclick="document.getElementById('galInput').click()">
        <span>🖼️</span><span>画像選択</span>
      </button>
    </div>
    <input type="file" id="camInput" accept="image/*" capture="environment" onchange="loadImage(this)">
    <input type="file" id="galInput" accept="image/*" onchange="loadImage(this)">
  </div>

  <!-- 判定ボタン -->
  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">
    ✨ 役・点数を判定する
  </button>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#888">Gemini AIが手牌を解析中...</div>
  </div>

  <!-- 結果 -->
  <div class="result" id="result"></div>
</div>

<script>
// ── 状態 ────────────────────────────────────────────────────────
let state = { dealer: false, tsumo: false, riichi: false, ippatsu: false, dbl: false, imageB64: null };

// ── APIキー ─────────────────────────────────────────────────────
function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return;
  localStorage.setItem('gemini_key', key);
  document.getElementById('apiOk').style.display = 'inline';
  document.getElementById('apiKey').value = '●'.repeat(20);
}
window.addEventListener('load', () => {
  const k = localStorage.getItem('gemini_key');
  if (k) {
    document.getElementById('apiKey').value = '●'.repeat(20);
    document.getElementById('apiOk').style.display = 'inline';
  }
});

// ── トグル ──────────────────────────────────────────────────────
function toggle(key) {
  state[key] = !state[key];
  const el = document.getElementById('tog' + key.charAt(0).toUpperCase() + key.slice(1));
  const classes = { dealer:'on-dealer', tsumo:'on-tsumo', riichi:'on-riichi', ippatsu:'on-riichi', dbl:'on-riichi' };
  el.classList.toggle(classes[key], state[key]);

  if (key === 'dealer') el.textContent = state.dealer ? '親' : '子';
  if (key === 'tsumo')  el.textContent = state.tsumo ? 'ツモ' : 'ロン';
  
  // リーチ時に一発・W立直を表示
  if (key === 'riichi' || key === 'ippatsu' || key === 'dbl') {
    document.getElementById('togIppatsu').style.display = state.riichi ? 'inline-block' : 'none';
    document.getElementById('togDbl').style.display = state.riichi ? 'inline-block' : 'none';
    if (!state.riichi) { state.ippatsu = false; state.dbl = false; }
  }
}

// ── 画像読み込み ────────────────────────────────────────────────
function loadImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const original = e.target.result;
    const resized = await resize(original, 800, 0.8);
    state.imageB64 = resized.split(',')[1];
    document.getElementById('preview').src = resized;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('analyzeBtn').style.display = 'block';
    document.getElementById('result').style.display = 'none';
  };
  reader.readAsDataURL(file);
  input.value = '';
}
function resize(dataUrl, max, q) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else       { w = Math.round(w * max / h); h = max; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', q));
    };
    img.src = dataUrl;
  });
}

// ── Gemini API ──────────────────────────────────────────────────
async function callGemini(b64) {
  const key = localStorage.getItem('gemini_key');
  if (!key) throw new Error('APIキーが設定されていません');

  const prompt = `この麻雀ゲームの画像を見て、画面下部に表示されている「プレイヤーの手牌」を読み取ってください。

以下のJSON形式のみで返してください（説明文・コードブロック不要）:
{
  "tiles": ["3m","4m","6m","7m","8m","7p","8p","9p","3s","3s","3s","9s","9s"],
  "agari": "5m",
  "description": "手牌の説明"
}

牌の表記ルール:
- 萬子: 1m〜9m
- 筒子: 1p〜9p  
- 索子: 1s〜9s
- 字牌: 東=1z 南=2z 西=3z 北=4z 白=5z 発=6z 中=7z

tilesは和了牌を除いた13枚、agariは和了牌1枚。
ゲーム画面全体が見えている場合は画面下部の手牌列を読んでください。`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: 'image/jpeg', data: b64 } },
            { text: prompt }
          ]
        }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 500 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Gemini API エラー (${res.status}): ${err.slice(0,200)}`);
  }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('AIの応答をJSONとして読み取れませんでした:\n' + text.slice(0,200));
  return JSON.parse(m[0]);
}

// ── タイル変換 ──────────────────────────────────────────────────
function tileToId(str) {
  const n = parseInt(str);
  const s = str.slice(-1);
  if (s === 'm') return n;
  if (s === 'p') return n + 9;
  if (s === 's') return n + 18;
  if (s === 'z') return n + 27;
  return null;
}

// ── 麻雀ロジック ───────────────────────────────────────────────
const isHon  = id => id > 27;
const numF   = id => id <= 27 ? ((id-1) % 9) + 1 : id - 27;
const suitF  = id => id<=9?'m':id<=18?'p':id<=27?'s':'z';
const isTerm = id => !isHon(id) && (numF(id)===1 || numF(id)===9);
const isYaoc = id => isHon(id) || isTerm(id);

function decompose(tiles) {
  const cnt = new Array(35).fill(0);
  tiles.forEach(t => cnt[t]++);
  const results = [];
  for (let p = 1; p <= 34; p++) {
    if (cnt[p] < 2) continue;
    const c = [...cnt]; c[p] -= 2;
    const ms = [];
    if (pullMentsu(c, ms)) results.push({ pair: p, ms: ms.slice() });
  }
  return results;
}
function pullMentsu(cnt, ms) {
  let f = -1;
  for (let i = 1; i <= 34; i++) { if (cnt[i] > 0) { f = i; break; } }
  if (f === -1) return ms.length === 4;
  if (cnt[f] >= 3) {
    cnt[f] -= 3; ms.push({ t:'k', a:f });
    if (pullMentsu(cnt, ms)) return true;
    ms.pop(); cnt[f] += 3;
  }
  if (!isHon(f) && numF(f) <= 7) {
    const b=f+1, c2=f+2;
    if (suitF(b)===suitF(f) && cnt[b]>0 && cnt[c2]>0) {
      cnt[f]--; cnt[b]--; cnt[c2]--;
      ms.push({ t:'s', a:f });
      if (pullMentsu(cnt, ms)) return true;
      ms.pop(); cnt[f]++; cnt[b]++; cnt[c2]++;
    }
  }
  return false;
}
const isChiitoi = t => { const c={}; t.forEach(x=>c[x]=(c[x]||0)+1); return Object.keys(c).length===7&&Object.values(c).every(v=>v===2); };
const isKokushi = t => [1,9,10,18,19,27,28,29,30,31,32,33,34].every(k=>t.includes(k));

function waitFu(d, agari) {
  if (d.pair === agari) return 2;
  for (const m of d.ms) {
    if (m.t !== 's') continue;
    if (agari === m.a+1) return 2;
    if ((numF(m.a)===1&&agari===m.a+2)||(numF(m.a)===7&&agari===m.a)) return 2;
  }
  return 0;
}

function calcFu(decomps, agari, tsumo, yakuNames, seat=28, round=28) {
  if (yakuNames.includes('七対子')) return 25;
  if (yakuNames.includes('平和'))   return tsumo ? 20 : 30;
  let best = 0;
  for (const d of decomps) {
    let fu = tsumo ? 22 : 30;
    if ([32,33,34,seat,round].includes(d.pair)) fu += 2;
    for (const m of d.ms) {
      if (m.t === 's') continue;
      fu += isYaoc(m.a) ? 8 : 4;
    }
    fu += waitFu(d, agari);
    if (fu > best) best = fu;
  }
  return Math.ceil(best / 10) * 10;
}

function detectYaku(tiles, agari, opts) {
  const { riichi, dbl, ippatsu, tsumo, seat=28, round=28 } = opts;
  const GR = new Set([20,21,22,24,26,33]);
  if (isKokushi(tiles)) return [{ n:'国士無双', h:13, ym:true }];
  if (tiles.every(isHon))  return [{ n:'字一色',  h:13, ym:true }];
  if (tiles.every(isTerm)) return [{ n:'清老頭',  h:13, ym:true }];
  if (tiles.every(t=>GR.has(t))) return [{ n:'緑一色', h:13, ym:true }];

  const yaku = [];
  if (dbl)     yaku.push({ n:'ダブル立直', h:2 });
  if (riichi)  yaku.push({ n:'立直', h:1 });
  if (ippatsu) yaku.push({ n:'一発', h:1 });
  if (tsumo)   yaku.push({ n:'門前清自摸和', h:1 });
  if (tiles.every(t=>!isYaoc(t))) yaku.push({ n:'断幺九', h:1 });
  const suits = new Set(tiles.filter(t=>!isHon(t)).map(suitF));
  const hasH  = tiles.some(isHon);
  if (suits.size===1 && hasH)  yaku.push({ n:'混一色', h:3 });
  if (suits.size===1 && !hasH) yaku.push({ n:'清一色', h:6 });
  if (isChiitoi(tiles)) { yaku.push({ n:'七対子', h:2 }); return yaku; }

  const decomps = decompose(tiles);
  if (!decomps.length) return [];

  let best=[], bestH=-1;
  for (const d of decomps) {
    const dy = decompYaku(d, tiles, agari, { tsumo, seat, round });
    const h = dy.reduce((s,y)=>s+y.h,0);
    if (h > bestH) { bestH=h; best=dy; }
  }
  return [...yaku, ...best];
}

function decompYaku(d, tiles, agari, { tsumo, seat, round }) {
  const { pair:p, ms } = d;
  const DRG=[32,33,34], WND=[28,29,30,31];
  const yaku=[];
  if (ms.every(m=>m.t==='k')) {
    if (tsumo||p!==agari) return [{ n:'四暗刻', h:13, ym:true }];
  }
  if (DRG.every(dr=>ms.some(m=>m.t==='k'&&m.a===dr))) return [{ n:'大三元', h:13, ym:true }];
  if (WND.every(w=>ms.some(m=>m.t==='k'&&m.a===w)))   return [{ n:'大四喜', h:13, ym:true }];
  if (WND.filter(w=>ms.some(m=>m.t==='k'&&m.a===w)).length===3&&WND.includes(p)) return [{ n:'小四喜', h:13, ym:true }];

  const allS=ms.every(m=>m.t==='s');
  const pYak=[32,33,34,seat,round].includes(p);
  if (allS&&!pYak&&waitFu(d,agari)===0) yaku.push({ n:'平和', h:1 });
  const seqs=ms.filter(m=>m.t==='s').map(m=>m.a).sort((a,b)=>a-b);
  if (seqs.some((v,i)=>i>0&&seqs[i-1]===v)) yaku.push({ n:'一盃口', h:1 });
  if (ms.every(m=>m.t==='k')) yaku.push({ n:'対々和', h:2 });
  if (ms.filter(m=>m.t==='k').length>=3) yaku.push({ n:'三暗刻', h:2 });
  const DN={32:'白',33:'発',34:'中'};
  ms.filter(m=>m.t==='k').forEach(m=>{
    if (DRG.includes(m.a)) yaku.push({ n:`役牌・${DN[m.a]}`, h:1 });
    if (m.a===seat)  yaku.push({ n:'役牌・自風', h:1 });
    if (m.a===round&&m.a!==seat) yaku.push({ n:'役牌・場風', h:1 });
  });

  for (let n=1;n<=7;n++) {
    if ([0,9,18].every(b=>ms.some(m=>m.t==='s'&&m.a===n+b))) { yaku.push({ n:'三色同順', h:2 }); break; }
  }
  for (const b of [0,9,18]) {
    if ([1,4,7].every(n=>ms.some(m=>m.t==='s'&&m.a===n+b))) { yaku.push({ n:'一気通貫', h:2 }); break; }
  }
  for (let n=1;n<=9;n++) {
    if ([0,9,18].every(b=>ms.some(m=>m.t==='k'&&m.a===n+b))) { yaku.push({ n:'三色同刻', h:2 }); break; }
  }

  const allY=ms.every(m=>m.t==='k'?isYaoc(m.a):(numF(m.a)===1||(numF(m.a)+2)===9))&&isYaoc(p);
  if (allY&&ms.some(m=>m.t==='s')) {
    yaku.push(tiles.some(isHon)?{ n:'混全帯幺九',h:2 }:{ n:'純全帯幺九',h:3 });
  }
  return yaku;
}

function calcPoints(han, fu, dealer) {
  const R = n => Math.ceil(n/100)*100;
  const LIMS=[
    {min:13,label:'役満',  dr:48000,dt:16000, nr:32000,ntd:16000,nto:8000 },
    {min:12,label:'三倍満',dr:36000,dt:12000, nr:24000,ntd:12000,nto:6000 },
    {min:11,label:'倍満',  dr:24000,dt:8000,  nr:16000,ntd:8000, nto:4000 },
    {min:8, label:'跳満',  dr:18000,dt:6000,  nr:12000,ntd:6000, nto:3000 },
    {min:5, label:'満貫',  dr:12000,dt:4000,  nr:8000, ntd:4000, nto:2000 },
  ];
  for (const l of LIMS) {
    if (han>=l.min) return dealer
      ? { label:l.label, ron:l.dr, ta:l.dt,  m:true }
      : { label:l.label, ron:l.nr, td:l.ntd, to:l.nto, m:true };
  }
  const b = fu * Math.pow(2, han+2);
  if (b>=2000) return dealer
    ? { label:'満貫', ron:12000, ta:4000, m:true }
    : { label:'満貫', ron:8000, td:4000, to:2000, m:true };
  return dealer
    ? { label:null, ron:R(b*6), ta:R(b*2), m:false }
    : { label:null, ron:R(b*4), td:R(b*2), to:R(b), m:false };
}

const HL = h => { if(h>=13)return'役満';if(h>=12)return'三倍満';if(h>=11)return'倍満';if(h>=8)return'跳満';if(h>=5)return'満貫';return`${h}飜`; };

// ── 解析実行 ────────────────────────────────────────────────────
async function analyze() {
  if (!state.imageB64) return;
  const analyzeBtn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  
  analyzeBtn.style.display = 'none';
  loading.style.display = 'flex';
  result.style.display = 'none';

  try {
    // Gemini API呼び出し
    const geminiResult = await callGemini(state.imageB64);
    
    // 牌データ変換
    const tiles13 = geminiResult.tiles.map(tileToId).filter(Boolean);
    const agariId = tileToId(geminiResult.agari);
    
    if (tiles13.length !== 13 || !agariId) {
      throw new Error('手牌が正しく読み取れませんでした');
    }
    
    const all14 = [...tiles13, agariId];
    
    // 役判定
    const opts = { riichi: state.riichi, dbl: state.dbl, ippatsu: state.ippatsu, tsumo: state.tsumo };
    const yaku = detectYaku(all14, agariId, opts);
    
    if (!yaku.length) {
      throw new Error('役がありません');
    }
    
    const han = Math.min(yaku.reduce((s,y)=>s+y.h,0), 13);
    const names = yaku.map(y=>y.n);
    const decomps = decompose(all14);
    const fu = han >= 5 ? 30 : calcFu(decomps, agariId, state.tsumo, names);
    const pts = calcPoints(han, fu, state.dealer);
    
    // 結果表示
    showResult({
      description: geminiResult.description,
      yaku, han, fu, pts
    });
    
  } catch (error) {
    showError(error.message);
  } finally {
    loading.style.display = 'none';
  }
}

function showResult(data) {
  const result = document.getElementById('result');
  result.innerHTML = `
    <div class="hand-desc">🀄 ${data.description}</div>
    
    <div class="section-title">🎯 役</div>
    <div class="yaku-list">
      ${data.yaku.map(y => `
        <div class="yaku-item">
          <div class="yaku-name">${y.n}</div>
          <div class="yaku-han ${y.ym ? 'yakuman' : ''}">${y.ym ? '役満' : y.h+'飜'}</div>
        </div>
      `).join('')}
    </div>
    
    <div class="badges">
      <div class="badge">
        <div class="badge-label">合計</div>
        <div class="badge-val">${HL(data.han)}</div>
        ${data.han < 5 ? `<div class="badge-sub">${data.han}飜</div>` : ''}
      </div>
      ${!data.pts.m ? `<div class="badge">
        <div class="badge-label">符</div>
        <div class="badge-val">${data.fu}符</div>
      </div>` : ''}
      <div class="badge red">
        <div class="badge-label">${state.dealer?'親':'子'}</div>
        <div class="badge-val">${data.pts.label || HL(data.han)}</div>
      </div>
    </div>
    
    <div class="pts-card">
      <div class="pts-title">💰 点数</div>
      <div class="pts-grid">
        <div class="pts-box">
          <div class="pts-lbl">ロン</div>
          <div class="pts-val">${data.pts.ron.toLocaleString()}</div>
          <div class="pts-unit">点</div>
        </div>
        ${state.dealer ? `<div class="pts-box">
          <div class="pts-lbl">ツモ（各）</div>
          <div class="pts-val">${(data.pts.ta||data.pts.td).toLocaleString()}</div>
          <div class="pts-unit">点</div>
        </div>` : `<div class="pts-box">
          <div class="pts-lbl">ツモ（親）</div>
          <div class="pts-val">${data.pts.td.toLocaleString()}</div>
          <div class="pts-unit">点</div>
        </div>
        <div class="pts-box">
          <div class="pts-lbl">ツモ（子）</div>
          <div class="pts-val">${data.pts.to.toLocaleString()}</div>
          <div class="pts-unit">点</div>
        </div>`}
      </div>
      ${!data.pts.m ? `<div class="pts-total">ツモ合計 ${state.dealer ? ((data.pts.ta||data.pts.td)*3).toLocaleString() : (data.pts.td + data.pts.to*2).toLocaleString()} 点</div>` : ''}
    </div>
    
    <button class="retry-btn" onclick="resetForRetry()">📷 別の手牌を解析する</button>
  `;
  result.style.display = 'block';
}

function showError(message) {
  const result = document.getElementById('result');
  result.innerHTML = `
    <div class="err-box">
      <div style="font-weight:700;margin-bottom:6px">⚠️ エラー</div>
      <div>${message}</div>
    </div>
    <button class="retry-btn" onclick="resetForRetry()">🔄 再試行</button>
  `;
  result.style.display = 'block';
}

function resetForRetry() {
  document.getElementById('analyzeBtn').style.display = 'block';
  document.getElementById('result').style.display = 'none';
}
</script>
